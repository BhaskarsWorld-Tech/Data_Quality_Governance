<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium dark navy → royal blue → deep violet gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0B1120"/>
      <stop offset="48%"  stop-color="#1A3166"/>
      <stop offset="100%" stop-color="#2E1B6E"/>
    </linearGradient>
    <!-- Glass sheen — top third only -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Gold gradient for guardian star -->
    <linearGradient id="gold" x1="20" y1="9" x2="20" y2="19" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <!-- Subtle blue inner radial glow -->
    <radialGradient id="innerGlow" cx="20" cy="22" r="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#60A5FA" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold glow behind star -->
    <radialGradient id="starGlow" cx="20" cy="14" r="6" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FDE68A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <!-- Inner blue glow -->
  <rect width="40" height="40" rx="10" fill="url(#innerGlow)"/>
  <!-- Gold star glow -->
  <rect width="40" height="40" rx="10" fill="url(#starGlow)"/>
  <!-- Glass sheen on top half -->
  <rect width="40" height="18" rx="10" fill="url(#sheen)"/>
  <!-- Crisp 1px border -->
  <rect x="0.75" y="0.75" width="38.5" height="38.5" rx="9.5"
        fill="none" stroke="white" stroke-opacity="0.14" stroke-width="1"/>

  <!-- Guardian shield outline -->
  <path d="M20 7L11 11.5V21C11 26.6 15.2 31.2 20 33C24.8 31.2 29 26.6 29 21V11.5L20 7Z"
        fill="white" fill-opacity="0.05"
        stroke="white" stroke-opacity="0.28" stroke-width="1"/>

  <!-- Gold 5-point guardian star (top of shield) -->
  <path d="M20 9.5L21.3 13.1L25.1 13.1L22.1 15.3L23.2 18.8L20 16.7L16.8 18.8L17.9 15.3L14.9 13.1L18.7 13.1Z"
        fill="url(#gold)"/>
  <!-- Star center sparkle -->
  <circle cx="20" cy="14" r="1.1" fill="white" opacity="0.88"/>

  <!-- Rising data quality bars (bottom of shield, guardian's vigilance) -->
  <rect x="12.5" y="25.5" width="3"   height="4"    rx="1" fill="white" fill-opacity="0.50"/>
  <rect x="17"   y="21.5" width="3"   height="8"    rx="1" fill="white" fill-opacity="0.72"/>
  <rect x="21.5" y="18.5" width="3"   height="11"   rx="1" fill="white" fill-opacity="0.96"/>
</svg>
