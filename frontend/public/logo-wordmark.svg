<svg width="190" height="36" viewBox="0 0 190 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0B1120"/>
      <stop offset="48%"  stop-color="#1A3166"/>
      <stop offset="100%" stop-color="#2E1B6E"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="2" x2="0" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gold" x1="16" y1="7" x2="16" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="guardianText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="2" width="32" height="32" rx="8" fill="url(#iconBg)"/>
  <rect x="0" y="2" width="32" height="16" rx="8" fill="url(#sheen)"/>
  <rect x="0.6" y="2.6" width="30.8" height="30.8" rx="7.5"
        fill="none" stroke="white" stroke-opacity="0.14" stroke-width="1"/>

  <!-- Shield -->
  <path d="M16 5.5L8.5 9.2V16.5C8.5 21.2 11.8 25.4 16 27C20.2 25.4 23.5 21.2 23.5 16.5V9.2L16 5.5Z"
        fill="white" fill-opacity="0.05"
        stroke="white" stroke-opacity="0.28" stroke-width="0.8"/>

  <!-- Gold star -->
  <path d="M16 7.5L17 10.4L20.1 10.4L17.6 12.2L18.6 15.1L16 13.4L13.4 15.1L14.4 12.2L11.9 10.4L15 10.4Z"
        fill="url(#gold)"/>
  <circle cx="16" cy="11.2" r="0.85" fill="white" opacity="0.88"/>

  <!-- Data bars -->
  <rect x="9.5"  y="20.5" width="2.4" height="3.5" rx="0.8" fill="white" fill-opacity="0.50"/>
  <rect x="13.5" y="17.5" width="2.4" height="6.5" rx="0.8" fill="white" fill-opacity="0.72"/>
  <rect x="17.5" y="14.5" width="2.4" height="9.5" rx="0.8" fill="white" fill-opacity="0.96"/>

  <!-- "Data" wordmark -->
  <text x="40" y="18"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="13" font-weight="800" letter-spacing="-0.4"
        fill="currentColor">
    Data
  </text>
  <!-- "Guardian" wordmark in amber/gold -->
  <text x="40" y="31"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
        font-size="12" font-weight="700" letter-spacing="-0.2"
        fill="#F59E0B">
    Guardian
  </text>
</svg>
